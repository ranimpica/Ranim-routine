<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ranim — Daily Routine</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400;500&display=swap');
:root {
  --black:#080808; --surface:#111; --surface2:#181818;
  --border:#1f1f1f; --border2:#2a2a2a;
  --gold:#C9A84C; --gold-dim:#7a6030; --gold-bg:#1c1a0a; --gold-glow:rgba(201,168,76,.07);
  --white:#F0EDE8; --muted:#555; --muted2:#888; --red:#c0392b; --green:#4a7a4a;
  --fs:'Cormorant Garamond',Georgia,serif;
  --fm:'DM Mono','Courier New',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--black);color:var(--white);font-family:var(--fm);min-height:100vh;}
.app{max-width:820px;margin:0 auto;padding:44px 18px 100px;}
.eyebrow{font-size:9px;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-bottom:10px;}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:40px;}
h1{font-family:var(--fs);font-size:clamp(32px,6vw,50px);font-weight:300;line-height:1;}
h1 em{font-style:italic;color:var(--gold);}
.date-box{text-align:right;}
.date-num{font-family:var(--fs);font-size:48px;font-weight:300;color:var(--gold);line-height:1;}
.date-lbl{font-size:10px;letter-spacing:.2em;color:var(--muted2);text-transform:uppercase;margin-top:4px;}
.banner{display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:var(--gold-glow);border:1px solid var(--gold-dim);
  padding:11px 16px;margin-bottom:14px;font-size:10px;letter-spacing:.1em;color:var(--gold);}
.banner.hidden{display:none;}
.back-btn{background:none;border:1px solid var(--gold-dim);color:var(--gold);
  font-family:var(--fm);font-size:9px;letter-spacing:.2em;text-transform:uppercase;
  padding:6px 12px;cursor:pointer;white-space:nowrap;}
.slabel{font-size:9px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;
  margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.slabel::after{content:'';flex:1;height:1px;background:var(--border2);}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-bottom:14px;}
.stat{background:var(--surface);padding:14px;}
.stat-lbl{font-size:9px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:5px;}
.stat-val{font-family:var(--fs);font-size:26px;font-weight:300;}
.stat-val.g{color:var(--gold);}
.stat-sub{font-size:9px;color:var(--muted);margin-top:2px;}
.prog-wrap{background:var(--surface);padding:20px;margin-bottom:36px;}
.prog-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.prog-title{font-size:10px;letter-spacing:.2em;color:var(--muted2);text-transform:uppercase;}
.prog-pct{font-family:var(--fs);font-size:22px;color:var(--gold);}
.prog-track{height:5px;background:var(--border2);overflow:hidden;margin-bottom:20px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));transition:width .5s ease;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-nav-lbl{font-size:10px;letter-spacing:.2em;color:var(--white);text-transform:uppercase;}
.cal-arr{background:none;border:1px solid var(--border2);color:var(--muted2);
  font-size:16px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cal-hint{font-size:9px;color:var(--muted);letter-spacing:.1em;margin-bottom:10px;}
.cal-dots{display:flex;flex-wrap:wrap;gap:4px;}
.cal-dot{width:28px;height:28px;border-radius:2px;background:var(--border);
  display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);cursor:pointer;}
.cal-dot.today{border:1px solid var(--gold);color:var(--gold);}
.cal-dot.selected{background:var(--gold)!important;color:var(--black)!important;font-weight:600;}
.cal-dot.has-tasks{background:var(--gold-dim);color:var(--black);}
.cal-dot.done-full{background:var(--green);color:#fff;}
.toolbar{background:var(--surface);padding:14px 16px;
  display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:2px;}
.toolbar-lbl{font-size:9px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;flex:1;min-width:100px;}
.tbtn{background:none;border:1px solid var(--border2);color:var(--muted2);
  font-family:var(--fm);font-size:9px;letter-spacing:.15em;text-transform:uppercase;
  padding:7px 12px;cursor:pointer;white-space:nowrap;}
.tbtn.gold{border-color:var(--gold-dim);color:var(--gold-dim);}
.tbtn.disabled{opacity:.3;pointer-events:none;}
.tbtn.danger{border-color:#333;color:#444;}
.day-bar{background:var(--surface);padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:2px;}
.day-lbl{font-size:9px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:3px;}
.day-count{font-family:var(--fs);font-size:19px;}
.day-count span{color:var(--gold);}
.pillars{display:flex;flex-direction:column;gap:2px;}
.p-block{background:var(--surface);overflow:hidden;}
.p-hdr{display:flex;align-items:center;gap:12px;padding:14px 16px;
  cursor:pointer;user-select:none;border-left:2px solid transparent;}
.p-hdr.open{border-left-color:var(--gold);}
.p-hdr.has-tasks{background:var(--gold-bg)!important;}
.p-hdr.has-tasks .pn{color:var(--gold)!important;}
.p-hdr.has-tasks .pc{color:var(--gold-dim)!important;}
.p-ico{font-size:13px;width:20px;text-align:center;flex-shrink:0;pointer-events:none;}
.p-info{flex:1;min-width:0;pointer-events:none;}
.pn{font-size:11px;letter-spacing:.1em;text-transform:uppercase;}
.pc{font-size:9px;color:var(--muted2);margin-top:2px;}
.p-bar{width:50px;height:3px;background:var(--border2);flex-shrink:0;pointer-events:none;}
.p-bar-fill{height:100%;background:var(--gold);}
.p-chev{font-size:9px;color:var(--muted);transition:transform .3s;flex-shrink:0;pointer-events:none;}
.p-chev.open{transform:rotate(180deg);}
.p-body{display:none;border-top:1px solid var(--border);}
.p-body.open{display:block;}
.t-list{padding:6px 16px;}
.empty{font-size:10px;color:var(--muted);padding:12px 0;letter-spacing:.1em;}
.t-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);}
.t-row:last-child{border-bottom:none;}
.t-box{width:22px;height:22px;border:1px solid var(--border2);flex-shrink:0;
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;}
.t-row.checked .t-box{background:var(--gold);border-color:var(--gold);color:var(--black);}
.t-nm{flex:1;font-size:13px;color:var(--white);cursor:pointer;line-height:1.4;padding:2px 0;}
.t-row.checked .t-nm{color:var(--muted);text-decoration:line-through;}
.t-del{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--muted);font-size:22px;flex-shrink:0;}
.t-del:active{color:var(--red);}
.add-area{padding:10px 16px;border-top:1px solid var(--border);}
.add-row{display:flex;gap:8px;}
.add-inp{flex:1;background:var(--border2);border:none;border-bottom:1px solid var(--border2);
  color:var(--white);font-family:var(--fm);font-size:16px;
  padding:10px;outline:none;-webkit-appearance:none;}
.add-inp:focus{border-bottom:1px solid var(--gold);background:var(--surface2);}
.add-inp::placeholder{color:var(--muted);}
.add-btn{background:none;border:1px solid var(--border2);color:var(--gold-dim);
  font-family:var(--fm);font-size:11px;padding:10px 14px;cursor:pointer;white-space:nowrap;}
.quote{padding:28px;text-align:center;border:1px solid var(--border);margin-top:20px;}
.quote p{font-family:var(--fs);font-size:17px;font-style:italic;color:var(--muted2);line-height:1.6;}
.quote p strong{color:var(--gold);font-style:normal;}

/* Loading overlay */
.loading{position:fixed;inset:0;background:var(--black);display:flex;align-items:center;
  justify-content:center;z-index:9998;font-size:11px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;}
.loading.hidden{display:none;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--gold);color:var(--black);font-family:var(--fm);
  font-size:11px;padding:11px 20px;z-index:9999;transition:transform .3s ease;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="loading" id="loading">Loading...</div>

<div class="app">
  <div class="eyebrow">Daily System — Doha</div>
  <div class="header-top">
    <div><h1>Ranim's<br><em>Routine</em></h1></div>
    <div class="date-box">
      <div class="date-num" id="vDay"></div>
      <div class="date-lbl" id="vMonth"></div>
    </div>
  </div>

  <div class="banner hidden" id="banner">
    <span id="bannerTxt"></span>
    <button class="back-btn" id="backBtn">↩ Today</button>
  </div>

  <div class="slabel">Monthly Overview</div>
  <div class="stats-grid">
    <div class="stat"><div class="stat-lbl">This Day</div><div class="stat-val g" id="sDayPct">0%</div><div class="stat-sub">done</div></div>
    <div class="stat"><div class="stat-lbl">Month Total</div><div class="stat-val" id="sMonthDone">0</div><div class="stat-sub">tasks done</div></div>
    <div class="stat"><div class="stat-lbl">Streak</div><div class="stat-val g" id="sStreak">0</div><div class="stat-sub">days active</div></div>
    <div class="stat"><div class="stat-lbl">Best Day</div><div class="stat-val" id="sBest">—</div><div class="stat-sub">tasks in a day</div></div>
  </div>

  <div class="prog-wrap">
    <div class="prog-head">
      <div class="prog-title">Month Completion</div>
      <div class="prog-pct" id="sMonthPct">0%</div>
    </div>
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="cal-nav">
      <button class="cal-arr" id="prevM">&#8249;</button>
      <div class="cal-nav-lbl" id="calLbl"></div>
      <button class="cal-arr" id="nextM">&#8250;</button>
    </div>
    <div class="cal-hint">Tap any day — past, today, or future</div>
    <div class="cal-dots" id="calDots"></div>
  </div>

  <div class="slabel" id="dayLabel">Today's Tasks</div>

  <div class="toolbar">
    <div class="toolbar-lbl" id="clipLbl">Copy &amp; Paste Tasks Between Days</div>
    <button class="tbtn" id="copyBtn">Copy Day</button>
    <button class="tbtn gold disabled" id="pasteBtn">Paste Here</button>
  </div>

  <div class="day-bar">
    <div>
      <div class="day-lbl">Progress</div>
      <div class="day-count"><span id="sDone">0</span> / <span id="sTotal">0</span> tasks</div>
    </div>
    <button class="tbtn" id="resetBtn">Reset Ticks</button>
  </div>

  <div class="pillars" id="pillars"></div>
  <div class="quote"><p id="quoteEl"></p></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG — change this to your Railway URL after deploying ──────────────────
var API = 'https://ranim-routine-production.up.railway.app'; // <-- replace this after deploy
var USER_ID = 'ranim';

// ── Pillars ───────────────────────────────────────────────────────────────────
var PILLARS = [
  {id:'health', icon:'◈', name:'Health'},
  {id:'money',  icon:'◆', name:'Money'},
  {id:'env',    icon:'□', name:'Environment'},
  {id:'growth', icon:'△', name:'Personal Growth'},
  {id:'brand',  icon:'✦', name:'Personal Brand'},
  {id:'social', icon:'◎', name:'Family & Friends'},
  {id:'reward', icon:'★', name:'Reward'},
  {id:'other',  icon:'◇', name:'Other Tasks'},
];

var QUOTES = [
  "The system doesn't care about your mood. <strong>Show up anyway.</strong>",
  "7,500 QAR today. <strong>20,000 QAR is the target.</strong>",
  "Your room is temporary. <strong>Your habits are permanent.</strong>",
  "Document the grind. <strong>The brand builds itself.</strong>",
  "Health is the foundation. <strong>Everything else is built on top.</strong>",
  "Artist. Athlete. Brand. <strong>Not someday. Systematically.</strong>",
  "The environment is broken. <strong>The discipline isn't.</strong>",
  "Every task done is a brick. <strong>You're building something real.</strong>",
];

// ── Helpers ───────────────────────────────────────────────────────────────────
function p2(n){ return ('0'+n).slice(-2); }
function dStr(d){ return d.getFullYear()+''+p2(d.getMonth()+1)+''+p2(d.getDate()); }
function mStr(d){ return d.getFullYear()+''+p2(d.getMonth()+1); }
function sameDay(a,b){ return dStr(a)===dStr(b); }

// ── Local clipboard (no need for server) ─────────────────────────────────────
function getClip(){ try{ var v=localStorage.getItem('clip'); return v?JSON.parse(v):null; }catch(e){ return null; } }
function setClip(v){ try{ localStorage.setItem('clip',JSON.stringify(v)); }catch(e){} }

// ── Streak (local is fine) ────────────────────────────────────────────────────
function updateStreak(checks){
  var active=false;
  for(var k in checks){ if(checks[k]){ active=true; break; } }
  var now=new Date(); now.setHours(0,0,0,0);
  var ts=now.toDateString(), ys=new Date(now.getTime()-86400000).toDateString();
  try{
    var s=JSON.parse(localStorage.getItem('streak')||'{"count":0,"last":""}');
    if(s.last===ts){ if(active&&s.count===0){s.count=1;s.last=ts;} }
    else if(s.last===ys){ if(active){s.count++;s.last=ts;} }
    else { s.count=active?1:0; s.last=ts; }
    localStorage.setItem('streak',JSON.stringify(s));
  }catch(e){}
}
function getStreak(){ try{ return JSON.parse(localStorage.getItem('streak')||'{"count":0}').count; }catch(e){ return 0; } }

// ── API calls ─────────────────────────────────────────────────────────────────
function apiGet(path, cb){
  fetch(API+path, { headers: {'x-user-id': USER_ID} })
    .then(function(r){ return r.json(); })
    .then(cb)
    .catch(function(e){ console.error(e); cb({}); });
}

function apiPost(path, body, cb){
  fetch(API+path, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'x-user-id': USER_ID },
    body: JSON.stringify(body)
  })
  .then(function(r){ return r.json(); })
  .then(cb||function(){})
  .catch(function(e){ console.error(e); });
}

// ── State ─────────────────────────────────────────────────────────────────────
var TODAY=(function(){ var d=new Date(); d.setHours(0,0,0,0); return d; })();
var viewDate=new Date(TODAY.getTime());
var calMonth=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
var openPillars={};

// Current day data (loaded from server)
var currentTasks=[];
var currentChecks={};
var monthSummary={};

// ── Load day from server ──────────────────────────────────────────────────────
function loadDay(cb){
  document.getElementById('loading').className='loading';
  apiGet('/day/'+dStr(viewDate), function(data){
    currentTasks  = data.tasks  || [];
    currentChecks = data.checks || {};
    if(sameDay(viewDate,TODAY)) updateStreak(currentChecks);
    document.getElementById('loading').className='loading hidden';
    if(cb) cb();
  });
}

function loadMonth(cb){
  apiGet('/month/'+mStr(calMonth), function(data){
    monthSummary = data || {};
    if(cb) cb();
  });
}

function saveDay(){
  apiPost('/day/'+dStr(viewDate), { tasks: currentTasks, checks: currentChecks });
}

// ── Single event listener ─────────────────────────────────────────────────────
document.addEventListener('click', function(e){
  var el=e.target, action=el.getAttribute('data-a');
  if(!action) return;
  e.stopPropagation();

  if(action==='toggle'){ doToggle(el.getAttribute('data-id')); }
  else if(action==='edit'){ doEdit(el); }
  else if(action==='del'){ doDel(el.getAttribute('data-id')); }
  else if(action==='ptoggle'){
    var pid=el.getAttribute('data-pid');
    openPillars[pid]=!openPillars[pid];
    renderPillars();
  }
  else if(action==='add'){
    var pid=el.getAttribute('data-pid');
    var inp=document.querySelector('.add-inp[data-pid="'+pid+'"]');
    if(inp) doAdd(pid,inp.value,inp);
  }
  else if(action==='calday'){
    var y=parseInt(el.getAttribute('data-y'));
    var mo=parseInt(el.getAttribute('data-mo'));
    var dy=parseInt(el.getAttribute('data-dy'));
    viewDate=new Date(y,mo,dy); viewDate.setHours(0,0,0,0);
    openPillars={};
    loadDay(function(){ loadMonth(renderAll); });
  }
  else if(action==='prev'){ calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()-1,1); loadMonth(renderAll); }
  else if(action==='next'){ calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()+1,1); loadMonth(renderAll); }
  else if(action==='back'){
    viewDate=new Date(TODAY.getTime());
    calMonth=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
    openPillars={};
    loadDay(function(){ loadMonth(renderAll); });
  }
  else if(action==='copy'){ doCopy(); }
  else if(action==='paste'){ doPaste(); }
  else if(action==='reset'){ doReset(); }
});

document.addEventListener('keydown', function(e){
  if(e.key!=='Enter') return;
  var el=e.target;
  if(el.classList.contains('add-inp')){
    var pid=el.getAttribute('data-pid');
    doAdd(pid,el.value,el);
  }
});

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll(){
  var tasks=currentTasks, checks=currentChecks;
  var total=tasks.length, done=0;
  for(var i=0;i<tasks.length;i++){ if(checks[tasks[i].id]) done++; }
  var pct=total>0?Math.round((done/total)*100):0;

  document.getElementById('vDay').textContent=viewDate.getDate();
  document.getElementById('vMonth').textContent=
    viewDate.toLocaleString('en',{month:'long'}).toUpperCase()+' · '+viewDate.getFullYear();

  var isToday=sameDay(viewDate,TODAY);
  var banner=document.getElementById('banner');
  if(isToday){ banner.className='banner hidden'; }
  else {
    banner.className='banner';
    var lbl=viewDate.toLocaleDateString('en',{weekday:'long',day:'numeric',month:'long'});
    document.getElementById('bannerTxt').textContent=(viewDate>TODAY?'Planning: ':'Viewing: ')+lbl;
  }
  document.getElementById('dayLabel').textContent=
    isToday?"Today's Tasks": viewDate>TODAY?"Plan This Day":"This Day's Log";

  document.getElementById('sDone').textContent=done;
  document.getElementById('sTotal').textContent=total;
  document.getElementById('sDayPct').textContent=pct+'%';

  var allDone=0,allTotal=0,maxDay=0;
  for(var k in monthSummary){
    allDone+=monthSummary[k].done||0;
    allTotal+=monthSummary[k].total||0;
    if(monthSummary[k].done>maxDay) maxDay=monthSummary[k].done;
  }
  var mp=allTotal>0?Math.round((allDone/allTotal)*100):0;
  document.getElementById('sMonthDone').textContent=allDone;
  document.getElementById('sBest').textContent=maxDay||'—';
  document.getElementById('sStreak').textContent=getStreak();
  document.getElementById('sMonthPct').textContent=mp+'%';
  document.getElementById('progFill').style.width=mp+'%';

  renderCal();
  renderPillars();

  var clip=getClip();
  document.getElementById('pasteBtn').className='tbtn gold'+(clip?'':' disabled');
  document.getElementById('clipLbl').textContent=clip?
    'Clipboard: '+clip.length+' task(s) ready':'Copy & Paste Tasks Between Days';

  document.getElementById('quoteEl').innerHTML=QUOTES[TODAY.getDate()%QUOTES.length];

  document.getElementById('prevM').setAttribute('data-a','prev');
  document.getElementById('nextM').setAttribute('data-a','next');
  document.getElementById('backBtn').setAttribute('data-a','back');
  document.getElementById('copyBtn').setAttribute('data-a','copy');
  document.getElementById('pasteBtn').setAttribute('data-a','paste');
  document.getElementById('resetBtn').setAttribute('data-a','reset');
}

function renderCal(){
  var y=calMonth.getFullYear(), mo=calMonth.getMonth();
  var dim=new Date(y,mo+1,0).getDate();
  document.getElementById('calLbl').textContent=
    calMonth.toLocaleString('en',{month:'long'}).toUpperCase()+' '+y;
  var html='';
  for(var d=1;d<=dim;d++){
    var dt=new Date(y,mo,d); dt.setHours(0,0,0,0);
    var cls='cal-dot';
    var isSel=sameDay(dt,viewDate), isTod=sameDay(dt,TODAY);
    if(isSel) cls+=' selected';
    else if(isTod) cls+=' today';
    if(!isSel && monthSummary[d]){
      cls+=(monthSummary[d].pct>=80?' done-full':' has-tasks');
    }
    html+='<div class="'+cls+'" data-a="calday" data-y="'+y+'" data-mo="'+mo+'" data-dy="'+d+'">'+(isTod&&!isSel?'<b>'+d+'</b>':d)+'</div>';
  }
  document.getElementById('calDots').innerHTML=html;
}

function renderPillars(){
  var tasks=currentTasks, checks=currentChecks;
  var html='';
  for(var i=0;i<PILLARS.length;i++){
    var p=PILLARS[i], pt=[], pd=0;
    for(var j=0;j<tasks.length;j++){
      if(tasks[j].pillarId===p.id){ pt.push(tasks[j]); if(checks[tasks[j].id]) pd++; }
    }
    var pp=pt.length>0?Math.round((pd/pt.length)*100):0;
    var open=!!openPillars[p.id], hasTasks=pt.length>0;
    html+='<div class="p-block">';
    html+='<div class="p-hdr'+(open?' open':'')+(hasTasks?' has-tasks':'')+'" data-a="ptoggle" data-pid="'+p.id+'">';
    html+='<div class="p-ico">'+p.icon+'</div>';
    html+='<div class="p-info"><div class="pn">'+p.name+'</div>';
    html+='<div class="pc">'+(hasTasks?pd+' / '+pt.length+' done':'No tasks yet')+'</div></div>';
    html+='<div class="p-bar"><div class="p-bar-fill" style="width:'+pp+'%"></div></div>';
    html+='<div class="p-chev'+(open?' open':'')+'">▼</div></div>';
    html+='<div class="p-body'+(open?' open':'')+'"><div class="t-list">';
    if(pt.length===0){
      html+='<div class="empty">No tasks yet — add one below</div>';
    } else {
      for(var k=0;k<pt.length;k++){
        var t=pt[k], chk=!!checks[t.id];
        html+='<div class="t-row'+(chk?' checked':'')+'">';
        html+='<div class="t-box" data-a="toggle" data-id="'+t.id+'">'+(chk?'✓':'')+'</div>';
        html+='<div class="t-nm" data-a="edit" data-id="'+t.id+'">'+esc(t.name)+'</div>';
        html+='<div class="t-del" data-a="del" data-id="'+t.id+'">×</div></div>';
      }
    }
    html+='</div><div class="add-area"><div class="add-row">';
    html+='<input class="add-inp" type="text" placeholder="+ Add task..." maxlength="80" data-pid="'+p.id+'" autocomplete="off">';
    html+='<button class="add-btn" data-a="add" data-pid="'+p.id+'">Add</button>';
    html+='</div></div></div></div>';
  }
  document.getElementById('pillars').innerHTML=html;
}

function esc(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Actions ───────────────────────────────────────────────────────────────────
function doToggle(id){
  if(currentChecks[id]) delete currentChecks[id]; else currentChecks[id]=true;
  if(sameDay(viewDate,TODAY)) updateStreak(currentChecks);
  saveDay();
  renderPillars();
  renderAll();
}

function doEdit(el){
  var id=el.getAttribute('data-id'), cur=el.textContent;
  el.innerHTML='';
  var inp=document.createElement('input');
  inp.type='text'; inp.value=cur;
  inp.style.cssText='background:transparent;border:none;border-bottom:1px solid #C9A84C;color:#F0EDE8;font-family:inherit;font-size:16px;padding:2px 0;outline:none;width:100%;';
  el.appendChild(inp);
  setTimeout(function(){ inp.focus(); },50);
  function save(){
    var val=(inp.value||'').trim();
    if(val && val!==cur){
      for(var i=0;i<currentTasks.length;i++){
        if(currentTasks[i].id===id){ currentTasks[i].name=val; break; }
      }
      saveDay();
    }
    renderAll();
  }
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',function(e){ if(e.key==='Enter') inp.blur(); });
}

function doDel(id){
  var next=[];
  for(var i=0;i<currentTasks.length;i++){ if(currentTasks[i].id!==id) next.push(currentTasks[i]); }
  currentTasks=next;
  delete currentChecks[id];
  saveDay();
  toast('Deleted');
  renderAll();
}

function doAdd(pid,val,inp){
  var name=(val||'').trim();
  if(!name){ toast('Type a task name'); return; }
  currentTasks.push({id:pid+'_'+Date.now(), pillarId:pid, name:name});
  if(inp) inp.value='';
  openPillars[pid]=true;
  saveDay();
  toast('Task added');
  renderAll();
}

function doCopy(){
  if(!currentTasks.length){ toast('No tasks to copy'); return; }
  setClip(currentTasks);
  toast('Copied '+currentTasks.length+' task(s)');
  renderAll();
}

function doPaste(){
  var clip=getClip();
  if(!clip||!clip.length){ toast('Nothing in clipboard'); return; }
  var added=0;
  for(var i=0;i<clip.length;i++){
    var t=clip[i], dup=false;
    for(var j=0;j<currentTasks.length;j++){
      if(currentTasks[j].pillarId===t.pillarId&&currentTasks[j].name===t.name){ dup=true; break; }
    }
    if(!dup){ currentTasks.push({id:t.pillarId+'_'+Date.now()+'_'+i, pillarId:t.pillarId, name:t.name}); added++; }
  }
  saveDay();
  toast('Pasted '+added+' task(s)');
  renderAll();
}

function doReset(){
  currentChecks={};
  saveDay();
  toast('Ticks reset');
  renderAll();
}

function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show';
  clearTimeout(el._t);
  el._t=setTimeout(function(){ el.className='toast'; },2200);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
loadDay(function(){ loadMonth(renderAll); });
</script>
</body>
</html>
